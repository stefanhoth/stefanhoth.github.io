# Netlify Configuration File
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command for Astro static site
  command = "npm run build"

  # Output directory where Astro builds to
  publish = "dist"

  # Ensure Node.js v20 or higher is used (Astro requirement)
  # Netlify automatically detects this from package.json engines field if set

[build.environment]
  # Set NODE_VERSION if needed (optional, Netlify auto-detects)
  NODE_VERSION = "24"

# Redirects configuration
# Domain aliases to primary domain with force (301!)
[[redirects]]
  from = "https://stefan-hoth.de/*"
  to = "https://stefanhoth.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.stefanhoth.com/*"
  to = "https://stefanhoth.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://stefanhoth.de/*"
  to = "https://stefanhoth.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.stefan-hoth.de/*"
  to = "https://stefanhoth.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://competent-archimedes-262389.netlify.com/*"
  to = "https://stefanhoth.com/:splat"
  status = 301
  force = true

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # XSS Protection (legacy, but still useful for older browsers)
    X-XSS-Protection = "1; mode=block"

    # Referrer Policy - no referrer information for privacy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions Policy - restrict access to browser features
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Strict Transport Security - force HTTPS for 1 year including subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy - adjust based on your actual needs
    # This is a starter policy, review and adjust for your site's requirements
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Production context settings
[context.production]
  environment = { NODE_ENV = "production" }

# Deploy preview context
[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

# Branch deploy context
[context.branch-deploy]
  environment = { NODE_ENV = "development" }
