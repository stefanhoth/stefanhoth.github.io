name: Preview Deploy

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  # Build runs npm lifecycle scripts (untrusted third-party code), so it is
  # isolated from the deploy job, which holds the Cloudflare secrets.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADw4zdHIwQQk6qDu
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  preview:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    env:
      PR_ALIAS: pr-${{ github.event.number }}
    outputs:
      preview-url: ${{ steps.meta.outputs.preview-url }}
    steps:
      # Checkout provides wrangler.jsonc, worker/, and functions/ only —
      # no npm install runs in this job.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Compute preview URL
        id: meta
        run: echo "preview-url=https://${PR_ALIAS}-stefanhoth-com.stefanhoth-de.workers.dev" >> "$GITHUB_OUTPUT"
      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ env.PR_ALIAS }}
      - name: Register GitHub deployment
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.meta.outputs.preview-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const headSha = context.payload.pull_request.head.sha;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              environment: "preview",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `Preview for PR #${context.issue.number}`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: "success",
              environment: "preview",
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Deployed to Cloudflare Workers",
            });

  e2e:
    name: E2E against preview
    needs: preview
    runs-on: ubuntu-latest
    # No secrets needed here — keep the job on read-only permissions since
    # npm ci runs third-party lifecycle scripts.
    permissions:
      contents: read
    env:
      E2E_BASE_URL: ${{ needs.preview.outputs.preview-url }}
    # Image tag must match @playwright/test's version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-
      - run: npm ci
      - name: Wait for preview to be reachable
        # A brand-new PR alias needs a fresh workers.dev subdomain, which can
        # take a moment to provision after the version upload.
        run: |
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$E2E_BASE_URL/") || status=000
            if [ "$status" = "200" ]; then
              echo "Preview reachable after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status - retrying in 5s"
            sleep 5
          done
          echo "Preview at $E2E_BASE_URL never became reachable" >&2
          exit 1
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
