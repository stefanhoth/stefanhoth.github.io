name: Preview Deploy

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  # Build runs npm lifecycle scripts (untrusted third-party code), so it is
  # isolated from the deploy job, which holds the Cloudflare secrets.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADw4zdHIwQQk6qDu
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  preview:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout provides wrangler.jsonc, worker/, and functions/ only —
      # no npm install runs in this job.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          PR_ALIAS: pr-${{ github.event.number }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ env.PR_ALIAS }}
      - name: Register GitHub deployment
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: https://pr-${{ github.event.number }}-stefanhoth-com.stefanhoth-de.workers.dev
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const headSha = context.payload.pull_request.head.sha;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              environment: "preview",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `Preview for PR #${context.issue.number}`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: "success",
              environment: "preview",
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Deployed to Cloudflare Workers",
            });
