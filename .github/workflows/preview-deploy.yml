name: Preview Deploy

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  # Build runs npm lifecycle scripts (untrusted third-party code), so it is
  # isolated from the deploy job, which holds the Cloudflare secrets.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADw4zdHIwQQk6qDu
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  preview:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    env:
      PR_ALIAS: pr-${{ github.event.number }}
    outputs:
      preview-url: ${{ steps.meta.outputs.preview-url }}
    steps:
      # Checkout provides wrangler.jsonc, worker/, and functions/ only —
      # no npm install runs in this job.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Compute preview URL
        id: meta
        run: echo "preview-url=https://${PR_ALIAS}-stefanhoth-com.stefanhoth-de.workers.dev" >> "$GITHUB_OUTPUT"
      - name: Upload preview version
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ env.PR_ALIAS }}
      - name: Register GitHub deployment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PREVIEW_URL: ${{ steps.meta.outputs.preview-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const headSha = context.payload.pull_request.head.sha;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              environment: "preview",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `Preview for PR #${context.issue.number}`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: "success",
              environment: "preview",
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Deployed to Cloudflare Workers",
            });

  e2e:
    name: E2E against preview
    needs: preview
    runs-on: ubuntu-latest
    # No secrets needed here — keep the job on read-only permissions since
    # npm ci runs third-party lifecycle scripts.
    permissions:
      contents: read
    env:
      E2E_BASE_URL: ${{ needs.preview.outputs.preview-url }}
    # Image tag must match @playwright/test's version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-
      - run: npm ci
      - name: Wait for preview to be reachable
        # A brand-new PR alias needs a fresh workers.dev subdomain, which can
        # take a moment to provision after the version upload.
        run: |
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$E2E_BASE_URL/") || status=000
            if [ "$status" = "200" ]; then
              echo "Preview reachable after $i attempt(s)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status - retrying in 5s"
            sleep 5
          done
          echo "Preview at $E2E_BASE_URL never became reachable" >&2
          exit 1
      - name: Run e2e tests
        run: npm run test:e2e -- --reporter=list,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json
      - name: Write test summary
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require("fs");
            const reportPath = "playwright-report/results.json";

            if (!fs.existsSync(reportPath)) {
              await core.summary
                .addHeading("E2E against preview")
                .addRaw("No results.json found — the suite likely crashed before any test ran.")
                .write();
              return;
            }

            const { stats = {} } = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const { expected = 0, unexpected = 0, flaky = 0, skipped = 0, duration = 0 } = stats;
            const ok = unexpected === 0;

            await core.summary
              .addHeading(`E2E against preview ${ok ? "✅" : "❌"}`)
              .addRaw(`Tested against ${process.env.E2E_BASE_URL}`)
              .addTable([
                [
                  { data: "Passed", header: true },
                  { data: "Failed", header: true },
                  { data: "Flaky", header: true },
                  { data: "Skipped", header: true },
                  { data: "Duration", header: true },
                ],
                [
                  String(expected),
                  String(unexpected),
                  String(flaky),
                  String(skipped),
                  `${(duration / 1000).toFixed(1)}s`,
                ],
              ])
              .write();
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
