name: Sync Obsidian Vault

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  # Lets an external caller (e.g. a shortcut, an Obsidian plugin, a webhook
  # receiver) trigger a sync on demand via the GitHub API:
  #   POST /repos/stefanhoth/stefanhoth.com/dispatches
  #   { "event_type": "sync-vault" }
  # Requires a PAT (classic: "repo" scope, fine-grained: "Contents: write") —
  # the built-in GITHUB_TOKEN cannot call this endpoint.
  repository_dispatch:
    types: [sync-vault]

concurrency:
  group: sync-vault
  cancel-in-progress: false

# main is protected by a ruleset requiring a PR with 4 green status checks
# (Lint/Build/Test/E2E against preview) and a successful "preview" deployment
# — a direct push is rejected. Nothing here writes with the default
# GITHUB_TOKEN, so no elevated permissions are needed for it.
permissions:
  contents: read

jobs:
  sync:
    name: Sync vault from Obsidian
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      # obsidian-headless is a devDependency, not a global install — put its
      # bin on PATH directly instead of going through npx. `npx ob` would
      # also match the unrelated "ob" package on the npm registry, so it's
      # not safe to rely on npx falling back correctly in every environment.
      - name: Add local node_modules/.bin to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      # A fresh checkout has no Obsidian Sync state, so a pull never learns
      # about files that were deleted remotely — they would linger in the
      # repo forever. Start from an empty directory so the pull produces an
      # exact mirror of the vault, including deletions and renames. Safe to
      # do before anything is committed: if the sync fails, the job aborts
      # and nothing is pushed.
      - name: Empty the vault directory for a mirror sync
        run: |
          rm -rf ./vault
          mkdir ./vault

      - name: Log in to Obsidian Sync
        env:
          OBSIDIAN_EMAIL: ${{ secrets.OBSIDIAN_USER }}
          OBSIDIAN_PASSWORD: ${{ secrets.OBSIDIAN_PASS }}
        run: ob login --email "$OBSIDIAN_EMAIL" --password "$OBSIDIAN_PASSWORD"

      - name: Link local vault directory to the remote vault
        env:
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT }}
          OBSIDIAN_E2EE_PASSWORD: ${{ secrets.OBSIDIAN_E2EE }}
        run: |
          ARGS=(--vault "$OBSIDIAN_VAULT_NAME" --path ./vault --device-name github-action-website-publish)
          if [ -n "$OBSIDIAN_E2EE_PASSWORD" ]; then
            ARGS+=(--password "$OBSIDIAN_E2EE_PASSWORD")
          fi
          ob sync-setup "${ARGS[@]}"

      - name: Restrict sync to pull-only
        run: ob sync-config --path ./vault --mode pull-only

      - name: Pull latest vault content
        run: ob sync --path ./vault

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain vault/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # The social preview cards in public/img/og/ are rendered from vault
      # frontmatter (title/description), and this workflow is what changes
      # that frontmatter — regenerate them here so they land in the same PR
      # as the content they're derived from.
      - name: Regenerate social preview cards
        if: steps.changes.outputs.changed == 'true'
        run: npm run og:images

      # First gate: catches broken frontmatter before it's even pushed to a
      # branch. ci.yml's own Build job is the second, required gate on the PR.
      - name: Validate build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      # Pushed and opened with a PAT, not the default GITHUB_TOKEN: pushes and
      # PR events authenticated with GITHUB_TOKEN don't trigger downstream
      # workflows, which would leave ci.yml/preview-deploy.yml — and the
      # required status checks / preview deployment the branch ruleset
      # demands — never running.
      - name: Push branch and open/refresh the PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_COMMIT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git switch -c chore/sync-vault
          git add vault/ public/img/og/
          git commit -m "chore(vault): sync from Obsidian"
          git push --force origin chore/sync-vault

          existing_pr=$(gh pr list --head chore/sync-vault --state open --json number --jq '.[0].number // empty')
          if [ -z "$existing_pr" ]; then
            gh pr create --base main --head chore/sync-vault \
              --title "chore(vault): sync from Obsidian" \
              --body "Automated vault sync — opened by .github/workflows/sync-vault.yml."
            gh pr merge chore/sync-vault --auto --squash
          fi
